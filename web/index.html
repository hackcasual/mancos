<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>YAFC Web — planner (milestone 1)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.45 system-ui, sans-serif; background: #17191d; color: #e8e6e3; }
  header { display: flex; gap: 12px; align-items: center; padding: 10px 16px; background: #22252b; }
  header h1 { font-size: 16px; margin: 0 12px 0 0; font-weight: 600; }
  #status { color: #9aa0a6; font-size: 13px; }
  main { display: grid; grid-template-columns: 320px 1fr; gap: 0; height: calc(100vh - 52px); }
  #left { border-right: 1px solid #2e3238; padding: 12px; overflow-y: auto; }
  #right { padding: 12px 16px; overflow-y: auto; }
  input[type=text], input[type=number] { width: 100%; padding: 6px 8px; background: #101215; color: inherit; border: 1px solid #3a3f46; border-radius: 4px; }
  button { background: #2f6fed; color: white; border: 0; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
  button.small { padding: 2px 7px; font-size: 12px; }
  button.ghost { background: #2c3037; }
  .row { display: flex; gap: 8px; align-items: center; padding: 4px 2px; }
  .row img, .goods img { width: 24px; height: 24px; image-rendering: pixelated; }
  .muted { color: #9aa0a6; }
  .list > div:hover { background: #22252b; }
  table { border-collapse: collapse; width: 100%; margin-top: 8px; }
  th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid #2a2e34; }
  th { color: #9aa0a6; font-weight: 500; font-size: 12px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: #6fcf7c; } .neg { color: #e46e6e; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: #9aa0a6; margin: 16px 0 6px; }
  #recipeInfo { margin-top: 10px; }
  .pill { background: #2c3037; border-radius: 999px; padding: 1px 8px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>YAFC Web</h1>
  <input type="file" id="bundleFile" accept=".yafcbundle,.zip" hidden>
  <button id="loadBtn">Load bundle…</button>
  <span id="status">no bundle loaded — build one with yafc-bundler</span>
</header>
<main>
  <div id="left">
    <input type="text" id="search" placeholder="Search goods (e.g. lead-plate)…" disabled>
    <div id="results" class="list"></div>
    <div id="recipeInfo"></div>
  </div>
  <div id="right">
    <div class="row">
      <h2 style="margin:0">Production table</h2>
      <button id="solveBtn" class="small" disabled>Solve</button>
      <button id="clearBtn" class="small ghost" disabled>Clear</button>
    </div>
    <div id="goals" class="muted">No goals yet — search a goods and set a demand.</div>
    <table id="rows" hidden>
      <thead><tr><th></th><th>Recipe</th><th class="num">Crafts/min</th><th>Flows</th></tr></thead>
      <tbody></tbody>
    </table>
    <h2>Linked goods</h2>
    <div id="links" class="muted">—</div>
    <h2>Unlinked flows (imports − / surplus +)</h2>
    <div id="flows" class="muted">—</div>
  </div>
</main>
<script type="module" src="app.js"></script>
</body>
</html>
